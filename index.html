<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的基金实时监控</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📊</span>
                <h1>我的基金监控</h1>
            </div>
            <div class="header-actions">
                <div class="auto-refresh">
                    <label>自动刷新</label>
                    <select id="refreshInterval">
                        <option value="0">关闭</option>
                        <option value="30">30秒</option>
                        <option value="60" selected>1分钟</option>
                        <option value="300">5分钟</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="btnRefresh">🔄 刷新净值</button>
                <button class="btn btn-add" id="btnAddFund">+ 添加基金</button>
            </div>
        </div>
    </header>

    <div class="trading-status-banner" id="tradingStatus" style="display:none"></div>

    <section class="dashboard">
        <div class="stat-card stat-total"><div class="stat-label">持有基金</div><div class="stat-value" id="statTotal">0</div></div>
        <div class="stat-card stat-up"><div class="stat-label">今日上涨</div><div class="stat-value" id="statUp">--</div><div class="stat-sub" id="statUpTotal">--</div></div>
        <div class="stat-card stat-down"><div class="stat-label">今日下跌</div><div class="stat-value" id="statDown">--</div><div class="stat-sub" id="statDownTotal">--</div></div>
        <div class="stat-card stat-flat"><div class="stat-label">今日持平</div><div class="stat-value" id="statFlat">--</div></div>
        <div class="stat-card stat-alert"><div class="stat-label">预警提醒</div><div class="stat-value" id="statAlert">0</div></div>
        <div class="stat-card stat-news"><div class="stat-label">相关新闻</div><div class="stat-value" id="statNews">0</div></div>
    </section>

    <main class="main-content">
        <div class="fund-panel">
            <div class="panel-header">
                <h2>📈 持仓列表</h2>
                <div class="search-box"><input type="text" id="searchFund" placeholder="搜索代码/名称..."></div>
            </div>
            <div class="summary-bar" id="summaryBar">
                <div class="summary-item total">总资产: <strong id="totalAsset">¥--</strong></div>
                <div class="summary-item profit">今日盈亏: <strong id="todayProfit">¥--</strong></div>
                <div class="summary-item"><strong id="refreshProgress">0/0</strong> <span id="refreshStatus">等待刷新...</span></div>
            </div>
            <div class="loading-bar" id="loadingBar" style="display:none"><div class="loading-bar-inner" id="loadingBarInner"></div></div>
            <div class="fund-list-wrap" id="fundList">
                <div class="empty-state"><div class="empty-icon">📋</div><p>加载中...</p></div>
            </div>
        </div>
        <div class="news-panel">
            <div class="panel-header">
                <h2>📰 行业新闻</h2>
                <div class="news-filter">
                    <select id="newsSource">
                        <option value="cls" selected>财联社</option>
                        <option value="sina">新浪财经</option>
                        <option value="eastmoney">东方财富</option>
                        <option value="10jqka">同花顺</option>
                        <option value="wallstreetcn">华尔街见闻</option>
                        <option value="yicai">第一财经</option>
                    </select>
                    <button class="btn btn-sm btn-primary" id="btnLoadNews">加载</button>
                </div>
            </div>
            <div class="news-tabs">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="alert">⚠️ 预警</button>
                <button class="tab" data-filter="negative">📉 利空</button>
                <button class="tab" data-filter="positive">📈 利好</button>
            </div>
            <div class="news-list" id="newsList">
                <div class="empty-state"><div class="empty-icon">📰</div><p>点击「加载」获取新闻</p><p class="empty-hint">自动匹配你持仓的行业关键词</p></div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="addFundModal">
        <div class="modal">
            <div class="modal-header"><h3>添加基金</h3><button class="modal-close" id="closeModal">&times;</button></div>
            <div class="modal-body">
                <div class="form-group">
                    <label>基金代码</label>
                    <div class="input-with-btn">
                        <input type="text" id="inputFundCode" placeholder="如 013402 或 013402.OF">
                        <button class="btn btn-primary btn-sm" id="btnSearchFund">查询</button>
                    </div>
                    <p class="form-hint">场外基金: 6位代码自动补.OF后缀</p>
                </div>
                <div class="search-result" id="searchResult" style="display:none"><div class="fund-info-card" id="fundInfoCard"></div></div>
                <div class="form-group">
                    <label>持仓金额（选填）</label>
                    <input type="number" id="inputAmount" placeholder="如 10000" min="0" step="100">
                </div>
                <div class="form-group">
                    <label>预警阈值</label>
                    <div class="threshold-inputs">
                        <div class="threshold-input"><span class="threshold-label">📈 上涨预警</span><input type="number" id="inputUpThreshold" value="3" min="0" step="0.5">%</div>
                        <div class="threshold-input"><span class="threshold-label">📉 下跌预警</span><input type="number" id="inputDownThreshold" value="-2" max="0" step="0.5">%</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>关注行业关键词</label>
                    <input type="text" id="inputKeywords" placeholder="如 新能源,半导体,白酒（逗号分隔）">
                    <p class="form-hint">用于新闻匹配，留空则自动根据基金类型推断</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="btnCancelAdd">取消</button>
                <button class="btn btn-primary" id="btnConfirmAdd" disabled>确认添加</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <footer class="footer">
        <p>数据来源: Tushare金融数据接口 | 新闻仅供参考，不构成投资建议 | 最后更新: <span id="lastUpdate">--</span></p>
    </footer>

    <script src="data.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
